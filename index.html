<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Career Roadmap</title>
<style>
  :root {
    --bg: #080810;
    --bg2: #0f0f1a;
    --bg3: #16162a;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0ff;
    --muted: #6b6b8a;
    --white: #ffffff;

    --p1: #ffffff; /* белый — Фундамент */
    --p2: #60a5fa; /* синий — Практика */
    --p3: #34d399; /* зелёный — Монетизация */
    --p4: #fbbf24; /* золотой — Масштаб */

    --achieve: #34d399;
    --fail: #f87171;
    --goal: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── HEADER ─── */
  header {
    padding: 60px 60px 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 40px;
  }
  .header-left h1 {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1.1;
  }
  .header-left h1 span { color: var(--p1); }
  .header-left p {
    margin-top: 10px;
    color: var(--muted);
    font-size: 16px;
  }
  .header-stats {
    display: flex;
    gap: 32px;
  }
  .stat {
    text-align: center;
  }
  .stat-num {
    font-size: 32px;
    font-weight: 700;
    color: var(--white);
    line-height: 1;
  }
  .stat-label {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
  }
  .stat-num.green { color: var(--achieve); }
  .stat-num.red   { color: var(--fail); }
  .stat-num.purple{ color: var(--goal); }

  /* ─── CURRENT STATUS ─── */
  .status-bar {
    margin: 40px 60px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 32px;
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .status-dot {
    width: 12px;
    height: 12px;
    background: var(--achieve);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--achieve);
    flex-shrink: 0;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .status-text strong { color: var(--white); font-size: 15px; }
  .status-text span { color: var(--muted); font-size: 14px; margin-left: 8px; }
  .status-date {
    margin-left: auto;
    font-size: 13px;
    color: var(--muted);
  }

  /* ─── PHASES ─── */
  .phases-wrapper {
    padding: 0 60px 60px;
    overflow-x: auto;
  }
  .phases {
    display: flex;
    gap: 24px;
    min-width: max-content;
    padding-bottom: 20px;
  }

  /* ─── PHASE CARD ─── */
  .phase {
    width: 340px;
    flex-shrink: 0;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg2);
    overflow: hidden;
    transition: transform 0.2s;
  }
  .phase:hover { transform: translateY(-4px); }

  .phase-header {
    padding: 24px 24px 20px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .phase-number {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .phase-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--white);
  }
  .phase-period {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }
  .phase-status-badge {
    position: absolute;
    top: 24px;
    right: 24px;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .badge-active   { background: rgba(52,211,153,0.15); color: var(--achieve); border: 1px solid rgba(52,211,153,0.3); }
  .badge-upcoming { background: rgba(167,139,250,0.1); color: var(--p1); border: 1px solid rgba(167,139,250,0.2); }
  .badge-locked   { background: rgba(107,107,138,0.1); color: var(--muted); border: 1px solid rgba(107,107,138,0.2); }

  .phase-progress {
    height: 3px;
    background: rgba(255,255,255,0.06);
    margin-top: 16px;
    border-radius: 2px;
    overflow: hidden;
  }
  .phase-progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease;
  }

  .phase-body { padding: 20px 24px 24px; }

  /* ─── SECTION ─── */
  .section { margin-bottom: 20px; }
  .section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }
  .section-achieve .section-title { color: var(--achieve); }
  .section-achieve .section-title::before { background: var(--achieve); }
  .section-fail    .section-title { color: var(--fail); }
  .section-fail    .section-title::before { background: var(--fail); }
  .section-goal    .section-title { color: var(--goal); }
  .section-goal    .section-title::before { background: var(--goal); }

  /* ─── ITEMS ─── */
  .items-list { display: flex; flex-direction: column; gap: 8px; }

  .item {
    background: var(--bg3);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    line-height: 1.5;
    color: #c8c8e0;
    border: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 10px;
    cursor: default;
    transition: border-color 0.2s, background 0.2s;
  }
  .item:hover { border-color: rgba(255,255,255,0.15); background: #1c1c30; }
  .item-icon { flex-shrink: 0; font-size: 15px; margin-top: 1px; }

  .item-delete {
    margin-left: auto;
    flex-shrink: 0;
    opacity: 0;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    padding: 0 0 0 6px;
    transition: opacity 0.15s, color 0.15s;
  }
  .item:hover .item-delete { opacity: 1; }
  .item-delete:hover { color: var(--fail); }

  /* ─── ADD BUTTON ─── */
  .add-btn {
    width: 100%;
    margin-top: 8px;
    padding: 8px 14px;
    background: none;
    border: 1px dashed rgba(255,255,255,0.12);
    border-radius: 10px;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .add-btn:hover {
    border-color: rgba(255,255,255,0.25);
    color: var(--white);
    background: var(--bg3);
  }

  /* ─── MODAL ─── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg3);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 32px;
    width: 440px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6);
  }
  .modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 16px; color: var(--white); }
  .modal textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    resize: vertical;
    min-height: 80px;
    outline: none;
    transition: border-color 0.2s;
  }
  .modal textarea:focus { border-color: rgba(255,255,255,0.3); }
  .modal-actions { display: flex; gap: 10px; margin-top: 16px; justify-content: flex-end; }
  .btn-cancel {
    padding: 10px 20px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-size: 14px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  .btn-cancel:hover { color: var(--white); border-color: rgba(255,255,255,0.2); }
  .btn-add {
    padding: 10px 24px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-add:hover { opacity: 0.85; }

  /* ─── CONNECTOR LINE ─── */
  .phases-connector {
    display: flex;
    align-items: center;
    padding: 0 60px;
    margin-bottom: -10px;
    gap: 0;
    min-width: max-content;
  }
  .connector-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 2px solid;
  }
  .connector-line {
    flex: 1;
    width: 314px;
    height: 2px;
    opacity: 0.3;
    flex-shrink: 0;
  }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { height: 6px; width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #333350; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #4a4a70; }

  /* ─── EMPTY STATE ─── */
  .empty-hint {
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
    padding: 6px 0;
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-left">
    <h1>AI Career <span>Roadmap</span></h1>
    <p>Начало пути · <span id="start-date"></span></p>
  </div>
  <div class="header-stats">
    <div class="stat">
      <div class="stat-num green" id="total-achieve">0</div>
      <div class="stat-label">Достижений</div>
    </div>
    <div class="stat">
      <div class="stat-num red" id="total-fail">0</div>
      <div class="stat-label">Уроков</div>
    </div>
    <div class="stat">
      <div class="stat-num purple" id="total-goal">0</div>
      <div class="stat-label">Целей</div>
    </div>
  </div>
</header>

<!-- STATUS BAR -->
<div class="status-bar">
  <div class="status-dot"></div>
  <div class="status-text">
    <strong>Активная фаза:</strong>
    <span>Фаза 1 — Фундамент · Самостоятельное изучение ИИ</span>
  </div>
  <div class="status-date" id="status-date"></div>
</div>

<!-- CONNECTOR -->
<div class="phases-connector" id="connector"></div>

<!-- PHASES -->
<div class="phases-wrapper">
  <div class="phases" id="phases-container"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">Добавить запись</h3>
    <textarea id="modal-input" placeholder="Опиши своими словами..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Отмена</button>
      <button class="btn-add" id="modal-confirm">Добавить</button>
    </div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────
const PHASES = [
  {
    id: 'p1',
    number: 'Фаза 01',
    title: 'Фундамент',
    period: 'Сейчас → 3 месяца',
    color: '#ffffff',
    status: 'active',
    badge: 'Активна',
    badgeClass: 'badge-active',
    progress: 5,
    sections: {
      achieve: { label: 'Достижения', icon: '🏆' },
      fail:    { label: 'Провалы / Уроки', icon: '💡' },
      goal:    { label: 'Цели фазы', icon: '🎯',
        defaults: [
          'Понять что такое LLM и как они работают',
          'Освоить Claude Code и AI-агентов',
          'Пройти хотя бы один AI-курс до конца',
          'Сделать первый рабочий AI-промпт для реальной задачи',
        ]
      }
    }
  },
  {
    id: 'p2',
    number: 'Фаза 02',
    title: 'Первые проекты',
    period: '3 → 6 месяцев',
    color: '#60a5fa',
    status: 'upcoming',
    badge: 'Скоро',
    badgeClass: 'badge-upcoming',
    progress: 0,
    sections: {
      achieve: { label: 'Достижения', icon: '🏆' },
      fail:    { label: 'Провалы / Уроки', icon: '💡' },
      goal:    { label: 'Цели фазы', icon: '🎯',
        defaults: [
          'Запустить первый AI-агент для автоматизации задачи',
          'Построить прототип AI-продукта',
          'Получить первую обратную связь от реальных пользователей',
          'Разобраться с API OpenAI / Anthropic',
        ]
      }
    }
  },
  {
    id: 'p3',
    number: 'Фаза 03',
    title: 'Монетизация',
    period: '6 → 12 месяцев',
    color: '#34d399',
    status: 'upcoming',
    badge: 'Скоро',
    badgeClass: 'badge-upcoming',
    progress: 0,
    sections: {
      achieve: { label: 'Достижения', icon: '🏆' },
      fail:    { label: 'Провалы / Уроки', icon: '💡' },
      goal:    { label: 'Цели фазы', icon: '🎯',
        defaults: [
          'Первые деньги от AI-навыков (фриланс или продукт)',
          'Запустить AI SaaS или сервис с платящими клиентами',
          'Выстроить систему AI-автоматизации под конкретный бизнес',
          'Достичь $500+/мес от AI-деятельности',
        ]
      }
    }
  },
  {
    id: 'p4',
    number: 'Фаза 04',
    title: 'Масштаб',
    period: '1 → 2 года',
    color: '#fbbf24',
    status: 'locked',
    badge: 'Будущее',
    badgeClass: 'badge-locked',
    progress: 0,
    sections: {
      achieve: { label: 'Достижения', icon: '🏆' },
      fail:    { label: 'Провалы / Уроки', icon: '💡' },
      goal:    { label: 'Цели фазы', icon: '🎯',
        defaults: [
          'Запустить полноценный AI-стартап или продукт',
          'Команда и делегирование через AI-агентов',
          'Стать заметным в AI-комьюнити',
          'Выйти на стабильный доход от AI-бизнеса',
        ]
      }
    }
  }
];

// ── STATE ─────────────────────────────────────────────────────────────
let state = JSON.parse(localStorage.getItem('ai_roadmap') || 'null') || {
  p1: { achieve: [], fail: [], goal: PHASES[0].sections.goal.defaults.slice() },
  p2: { achieve: [], fail: [], goal: PHASES[1].sections.goal.defaults.slice() },
  p3: { achieve: [], fail: [], goal: PHASES[2].sections.goal.defaults.slice() },
  p4: { achieve: [], fail: [], goal: PHASES[3].sections.goal.defaults.slice() },
};

function save() {
  localStorage.setItem('ai_roadmap', JSON.stringify(state));
  updateStats();
}

// ── RENDER ────────────────────────────────────────────────────────────
function render() {
  const container = document.getElementById('phases-container');
  container.innerHTML = '';

  PHASES.forEach((phase, i) => {
    const phaseEl = document.createElement('div');
    phaseEl.className = 'phase';
    phaseEl.innerHTML = `
      <div class="phase-header">
        <div class="phase-number" style="color:${phase.color}">${phase.number}</div>
        <div class="phase-title">${phase.title}</div>
        <div class="phase-period">${phase.period}</div>
        <span class="phase-status-badge ${phase.badgeClass}">${phase.badge}</span>
        <div class="phase-progress">
          <div class="phase-progress-fill" style="width:${phase.progress}%;background:${phase.color}"></div>
        </div>
      </div>
      <div class="phase-body">
        ${renderSection(phase.id, 'achieve', phase.sections.achieve, phase.color)}
        ${renderSection(phase.id, 'fail',    phase.sections.fail,    phase.color)}
        ${renderSection(phase.id, 'goal',    phase.sections.goal,    phase.color)}
      </div>
    `;
    container.appendChild(phaseEl);
  });

  renderConnector();
  updateStats();
}

function renderSection(phaseId, type, section, color) {
  const items = state[phaseId][type] || [];
  const typeColor = type === 'achieve' ? 'var(--achieve)' : type === 'fail' ? 'var(--fail)' : 'var(--goal)';

  const itemsHtml = items.length === 0
    ? `<div class="empty-hint">Пока пусто — добавь первую запись</div>`
    : items.map((item, idx) => `
        <div class="item">
          <span class="item-icon">${section.icon}</span>
          <span>${escHtml(item)}</span>
          <button class="item-delete" onclick="deleteItem('${phaseId}','${type}',${idx})" title="Удалить">✕</button>
        </div>
      `).join('');

  const addLabel = type === 'achieve' ? 'Добавить достижение' : type === 'fail' ? 'Добавить урок / провал' : 'Добавить цель';

  return `
    <div class="section section-${type}">
      <div class="section-title">${section.label}</div>
      <div class="items-list">${itemsHtml}</div>
      <button class="add-btn" onclick="openModal('${phaseId}','${type}','${addLabel}')">
        <span style="font-size:16px;opacity:0.6">+</span> ${addLabel}
      </button>
    </div>
  `;
}

function renderConnector() {
  const el = document.getElementById('connector');
  el.innerHTML = '';
  PHASES.forEach((phase, i) => {
    const dot = document.createElement('div');
    dot.className = 'connector-dot';
    dot.style.borderColor = phase.color;
    dot.style.background = phase.status === 'active' ? phase.color : 'transparent';
    el.appendChild(dot);
    if (i < PHASES.length - 1) {
      const line = document.createElement('div');
      line.className = 'connector-line';
      line.style.background = `linear-gradient(to right, ${phase.color}, ${PHASES[i+1].color})`;
      line.style.width = '314px';
      el.appendChild(line);
    }
  });
}

// ── STATS ─────────────────────────────────────────────────────────────
function updateStats() {
  let a = 0, f = 0, g = 0;
  Object.values(state).forEach(s => {
    a += s.achieve.length;
    f += s.fail.length;
    g += s.goal.length;
  });
  document.getElementById('total-achieve').textContent = a;
  document.getElementById('total-fail').textContent    = f;
  document.getElementById('total-goal').textContent    = g;
}

// ── MODAL ─────────────────────────────────────────────────────────────
let modalCtx = null;

function openModal(phaseId, type, label) {
  modalCtx = { phaseId, type };
  document.getElementById('modal-title').textContent = label;
  document.getElementById('modal-input').value = '';

  const btn = document.getElementById('modal-confirm');
  const typeColor = type === 'achieve' ? '#34d399' : type === 'fail' ? '#f87171' : '#ffffff';
  btn.style.background = typeColor;
  btn.style.color = '#000';

  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('modal-input').focus(), 50);
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  modalCtx = null;
}

document.getElementById('modal-confirm').addEventListener('click', () => {
  const val = document.getElementById('modal-input').value.trim();
  if (!val || !modalCtx) return;
  state[modalCtx.phaseId][modalCtx.type].push(val);
  save();
  render();
  closeModal();
});

document.getElementById('modal-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    document.getElementById('modal-confirm').click();
  }
});

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// ── DELETE ────────────────────────────────────────────────────────────
function deleteItem(phaseId, type, idx) {
  state[phaseId][type].splice(idx, 1);
  save();
  render();
}

// ── UTILS ─────────────────────────────────────────────────────────────
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setDates() {
  const now = new Date();
  const opts = { day: 'numeric', month: 'long', year: 'numeric' };
  const str = now.toLocaleDateString('ru-RU', opts);
  document.getElementById('start-date').textContent = str;
  document.getElementById('status-date').textContent = str;
}

// ── INIT ──────────────────────────────────────────────────────────────
setDates();
render();
</script>
</body>
</html>
